<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Copilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #5b8cf7;
      --accent-hover: #7ba3ff;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --green: #34d399;
      --red: #f87171;
      --orange: #fb923c;
      --answer-bg: #1e2a1e;
      --answer-border: #2d4a2d;
      --summary-bg: #1a1d2e;
      --summary-border: #2d3a5a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.live    { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .dot.ok      { background: var(--green); }
    .dot.warn    { background: var(--orange); }
    .dot.offline { background: var(--red); }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 10px; padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; align-items: center; flex-wrap: wrap;
    }
    input[type="text"] {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 12px; font-size: 13px; flex: 1; min-width: 160px; max-width: 300px;
      outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--text-muted); }
    button {
      border: none; border-radius: 6px; padding: 8px 16px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    #btn-start { background: var(--accent); color: white; }
    #btn-start:hover { background: var(--accent-hover); }
    #btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-end { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
    #btn-end:hover { background: #4a2020; }
    #btn-end:disabled { opacity: 0.4; cursor: not-allowed; }
    #session-info { font-size: 12px; color: var(--text-muted); margin-left: auto; }

    /* ── Body ── */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── Transcript / history pane ── */
    .transcript-pane {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .utterance {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      animation: fadeIn 0.2s ease;
    }
    .utterance .time {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 4px; font-variant-numeric: tabular-nums;
    }
    .utterance .text { line-height: 1.5; }

    /* ── Session history ── */
    .history-header {
      font-size: 12px; color: var(--text-muted);
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .session-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      animation: fadeIn 0.2s ease;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    .session-item:hover { border-color: var(--accent); background: #1f2336; }
    .session-item .s-body { flex: 1; min-width: 0; }
    .session-item .s-title { font-weight: 500; margin-bottom: 3px; }
    .session-item .s-meta { font-size: 12px; color: var(--text-muted); }
    .session-item .s-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      padding: 2px 5px; border-radius: 4px; font-size: 14px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--text); background: var(--border); }
    .icon-btn.danger:hover { color: var(--red); }
    .export-bar {
      display: flex; gap: 8px; margin-bottom: 12px; align-items: center;
    }
    .export-btn {
      font-size: 12px; padding: 4px 10px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 5px; cursor: pointer; text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
      display: inline-block;
    }
    .export-btn:hover { border-color: var(--accent); color: var(--accent); }
    .session-item .s-badge {
      display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
      border-radius: 4px; margin-left: 8px; vertical-align: middle;
    }
    .s-badge.ongoing { background: #1e3a1e; color: var(--green); }
    .s-badge.ended   { background: #1a1d27; color: var(--text-muted); }

    .view-back {
      font-size: 12px; color: var(--accent); cursor: pointer;
      margin-bottom: 12px; display: inline-block;
    }
    .view-back:hover { color: var(--accent-hover); }

    /* ── Answer panel ── */
    .answer-pane {
      width: 360px; flex-shrink: 0;
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--surface);
    }
    .answer-pane h3 {
      padding: 14px 16px 10px;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .answers-list {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .answer-card {
      background: var(--answer-bg); border: 1px solid var(--answer-border);
      border-radius: 8px; padding: 12px;
      animation: fadeIn 0.2s ease;
    }
    .answer-card .q { font-size: 12px; color: var(--green); margin-bottom: 6px; font-style: italic; }
    .answer-card .a { font-size: 13px; line-height: 1.5; }
    .cursor { display: inline-block; color: var(--accent); animation: blink 1s step-end infinite; }

    /* ── PTT Button ── */
    .ptt-area {
      padding: 16px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    #btn-ptt {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--accent); color: white; font-size: 24px;
      border: 3px solid transparent; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-ptt:hover { background: var(--accent-hover); transform: scale(1.05); }
    #btn-ptt.recording { background: var(--red); border-color: #ff9999; animation: pulse 1s infinite; }
    #btn-ptt:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .ptt-hint { font-size: 11px; color: var(--text-muted); text-align: center; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #2a1a1a; color: var(--red); border: 1px solid #5a2a2a;
      border-radius: 8px; padding: 10px 18px; font-size: 13px;
      animation: fadeIn 0.2s ease;
      z-index: 999;
    }

    /* ── Empty state ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      color: var(--text-muted); gap: 8px; text-align: center;
    }
    .empty .icon { font-size: 40px; }
    .empty .title { font-size: 15px; font-weight: 500; color: var(--text); }

    /* ── Editable title ── */
    .editable-title {
      display: inline-flex; align-items: center; gap: 6px;
      font-weight: 600; font-size: 15px;
    }
    .editable-title input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--accent); border-radius: 5px;
      padding: 3px 8px; font-size: 15px; font-weight: 600;
      outline: none; max-width: 340px;
    }
    .edit-title-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 12px; padding: 2px 4px;
      border-radius: 3px; line-height: 1;
      transition: color 0.15s;
    }
    .edit-title-btn:hover { color: var(--accent); }

    /* ── Q&A history panel ── */
    .qa-card {
      background: var(--answer-bg); border: 1px solid var(--answer-border);
      border-radius: 8px; padding: 12px; animation: fadeIn 0.2s ease;
      margin-bottom: 8px;
    }
    .qa-card .q { font-size: 12px; color: var(--green); margin-bottom: 6px; font-style: italic; }
    .qa-card .a { font-size: 13px; line-height: 1.5; white-space: pre-wrap; }

    /* ── Summary ── */
    .summary-card {
      background: var(--summary-bg); border: 1px solid var(--summary-border);
      border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
      animation: fadeIn 0.2s ease;
    }
    .summary-card .summary-header {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--accent); margin-bottom: 8px;
    }
    .summary-card .summary-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
    .summary-card .summary-actions { margin-top: 10px; display: flex; gap: 8px; }
    .btn-summarize {
      font-size: 12px; padding: 5px 12px; background: var(--summary-bg);
      border: 1px solid var(--summary-border); color: var(--accent);
      border-radius: 5px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-summarize:hover { background: #20264a; border-color: var(--accent); }
    .btn-summarize:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Action items ── */
    --action-bg: #1a2218;
    --action-border: #2a4828;
    .action-items-card {
      background: var(--answer-bg); border: 1px solid #2a4828;
      border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
      animation: fadeIn 0.2s ease;
    }
    .action-items-card .ai-header {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--green); margin-bottom: 8px;
    }
    .action-items-card .ai-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
    .action-items-card .ai-actions { margin-top: 10px; display: flex; gap: 8px; }
    .btn-action-items {
      font-size: 12px; padding: 5px 12px; background: #1a2218;
      border: 1px solid #2a4828; color: var(--green);
      border-radius: 5px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-action-items:hover { background: #1e2e1c; border-color: var(--green); }
    .btn-action-items:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Search ── */
    .search-bar {
      display: flex; gap: 6px; margin-bottom: 10px; align-items: center;
    }
    .search-bar input {
      flex: 1; min-width: 0; max-width: none;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-clear {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 14px; padding: 2px 6px; border-radius: 4px;
      transition: color 0.15s;
    }
    .search-clear:hover { color: var(--text); }
    .utterance.hidden { display: none; }
    .search-no-results {
      font-size: 12px; color: var(--text-muted); padding: 8px 0;
    }

    /* ── Copy button ── */
    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* ── Settings panel ── */
    .settings-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 18px; padding: 4px 6px; border-radius: 5px; line-height: 1;
      transition: color 0.15s;
    }
    .settings-btn:hover { color: var(--text); }
    .settings-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; align-items: center; justify-content: center;
    }
    .settings-overlay.open { display: flex; }
    .settings-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 24px 28px; width: 360px; display: flex; flex-direction: column; gap: 16px;
    }
    .settings-panel h2 { font-size: 15px; font-weight: 600; margin: 0; }
    .settings-panel label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px; }
    .settings-panel input[type="text"] { width: 100%; max-width: none; }
    .settings-panel .s-row { display: flex; flex-direction: column; gap: 4px; }
    .settings-panel .s-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .settings-panel .s-save {
      background: var(--accent); color: white; border: none;
      border-radius: 6px; padding: 7px 18px; font-size: 13px; cursor: pointer;
    }
    .settings-panel .s-save:hover { background: var(--accent-hover); }
    .settings-panel .s-cancel {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer;
    }
    .settings-panel .s-cancel:hover { border-color: var(--text-muted); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    @keyframes pulse  { 0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); } 50% { box-shadow: 0 0 0 10px rgba(248,113,113,0); } }
    @keyframes blink  { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Meeting <span>Copilot</span></div>
  <div class="header-right">
    <div class="status-pill">
      <span class="dot" id="ollama-dot"></span>
      <span id="ollama-label">Ollama…</span>
    </div>
    <div class="status-pill">
      <span class="dot" id="rec-dot"></span>
      <span id="rec-label">Not recording</span>
    </div>
    <button class="settings-btn" id="btn-settings" title="Settings">⚙</button>
  </div>
</header>

<div class="settings-overlay" id="settings-overlay">
  <div class="settings-panel">
    <h2>⚙ Settings</h2>
    <div class="s-row">
      <label for="cfg-ollama-model">Ollama model</label>
      <input type="text" id="cfg-ollama-model" placeholder="e.g. llama3, mistral" maxlength="80" />
    </div>
    <div class="s-row">
      <label for="cfg-whisper-lang">Whisper language (ISO code)</label>
      <input type="text" id="cfg-whisper-lang" placeholder="e.g. en, pt, fr" maxlength="10" />
    </div>
    <div class="s-actions">
      <button class="s-cancel" id="settings-cancel">Cancel</button>
      <button class="s-save" id="settings-save">Save</button>
    </div>
  </div>
</div>

<div class="controls">
  <input type="text" id="meeting-title" placeholder="Meeting title (optional)" maxlength="80" />
  <button id="btn-start">▶ Start</button>
  <button id="btn-end" disabled>■ End</button>
  <span id="session-info"></span>
  <input type="text" id="global-search" placeholder="🔍 Search all meetings…" maxlength="120" style="margin-left:auto;" />
</div>

<div class="body">
  <div class="transcript-pane" id="transcript"></div>

  <div class="answer-pane">
    <h3>Q&amp;A</h3>
    <div class="answers-list" id="answers">
      <div class="empty" style="height:100%; padding:20px; color:var(--text-muted); font-size:13px; text-align:center;">
        Hold the mic button to ask a question
      </div>
    </div>
    <div class="ptt-area">
      <button id="btn-ptt" disabled title="Hold to ask a question">🎤</button>
      <div class="ptt-hint">Hold to ask · Release to send · Space</div>
      <button id="btn-summarize" class="btn-summarize" disabled style="margin-top:4px;">📋 Summarize meeting</button>
      <button id="btn-action-items" class="btn-action-items" disabled style="margin-top:2px;">✅ Extract action items</button>
    </div>
  </div>
</div>

<script>
  const API = "http://localhost:8000";
  let sessionId = null;
  let ws = null;
  let mediaRecorder = null;
  let audioChunks = [];
  const pendingAnswers = {};
  const pendingSummaries = {};

  const btnStart       = document.getElementById("btn-start");
  const btnEnd         = document.getElementById("btn-end");
  const btnPtt         = document.getElementById("btn-ptt");
  const btnSummarize   = document.getElementById("btn-summarize");
  const btnActionItems = document.getElementById("btn-action-items");
  const recDot      = document.getElementById("rec-dot");
  const recLabel    = document.getElementById("rec-label");
  const ollamaDot   = document.getElementById("ollama-dot");
  const ollamaLabel = document.getElementById("ollama-label");
  const sessionInfo = document.getElementById("session-info");
  const transcript  = document.getElementById("transcript");
  const answers     = document.getElementById("answers");
  const titleInput    = document.getElementById("meeting-title");
  const globalSearch  = document.getElementById("global-search");

  const pendingActionItems = {};

  // ── Init ───────────────────────────────────────────────────────────────────
  checkHealth();
  loadPastSessions();

  // ── Global search ──────────────────────────────────────────────────────────
  let _searchTimer = null;
  globalSearch.addEventListener("input", () => {
    clearTimeout(_searchTimer);
    const q = globalSearch.value.trim();
    if (!q) { loadPastSessions(); return; }
    _searchTimer = setTimeout(() => runGlobalSearch(q), 300);
  });

  async function runGlobalSearch(q) {
    if (sessionId) return; // don't disrupt an active session
    try {
      const res = await fetch(`${API}/meeting/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      showSearchResults(data.sessions || [], q);
    } catch {
      showToast("Search failed");
    }
  }

  function showSearchResults(sessions, q) {
    transcript.innerHTML = "";

    const header = document.createElement("div");
    header.className = "history-header";
    header.textContent = sessions.length
      ? `Search results for "${q}"`
      : `No results for "${q}"`;
    transcript.appendChild(header);

    if (!sessions.length) return;

    sessions.forEach(s => {
      const item = document.createElement("div");
      item.className = "session-item";
      const date = s.started_at
        ? new Date(s.started_at.replace(" ", "T") + "Z").toLocaleString()
        : "—";

      const body = document.createElement("div");
      body.className = "s-body";
      const matchCount = s.utterances.length;
      const preview = s.utterances.slice(0, 2).map(u => escHtml(u.text)).join(" … ");
      body.innerHTML = `
        <div class="s-title">${escHtml(s.title)}
          <span class="s-badge ended">${matchCount} match${matchCount !== 1 ? "es" : ""}</span>
        </div>
        <div class="s-meta">${date}</div>
        <div style="font-size:12px; color:var(--text-muted); margin-top:4px; font-style:italic;">${preview}</div>`;
      body.addEventListener("click", () => loadSession(s.session_id, s.title));
      item.appendChild(body);
      transcript.appendChild(item);
    });
  }

  // ── Health / Ollama status ─────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      const data = await res.json();
      if (data.ollama_available) {
        ollamaDot.className = "dot ok";
        ollamaLabel.textContent = "Ollama ✓";
      } else {
        ollamaDot.className = "dot warn";
        ollamaLabel.textContent = "Ollama unavailable";
      }
    } catch {
      ollamaDot.className = "dot offline";
      ollamaLabel.textContent = "Server offline";
    }
  }

  // ── Session history ────────────────────────────────────────────────────────
  async function loadPastSessions() {
    if (sessionId) return;
    try {
      const res = await fetch(`${API}/meeting/list`);
      const data = await res.json();
      showSessionHistory(data.sessions || []);
    } catch {
      showEmptyState();
    }
  }

  function showEmptyState() {
    transcript.innerHTML = `
      <div class="empty">
        <div class="icon">🎙️</div>
        <div class="title">No meetings yet</div>
        <div>Start a meeting to begin transcribing</div>
      </div>`;
  }

  function showSessionHistory(sessions) {
    if (sessionId) return;
    transcript.innerHTML = "";

    if (!sessions.length) { showEmptyState(); return; }

    const header = document.createElement("div");
    header.className = "history-header";
    header.textContent = "Past meetings";
    transcript.appendChild(header);

    const sorted = [...sessions].sort((a, b) =>
      (b.started_at || "").localeCompare(a.started_at || "")
    );

    sorted.forEach(s => {
      const item = document.createElement("div");
      item.className = "session-item";
      const date = s.started_at ? new Date(s.started_at.replace(" ", "T") + "Z").toLocaleString() : "—";
      const badge = s.ended_at
        ? `<span class="s-badge ended">ended</span>`
        : `<span class="s-badge ongoing">live</span>`;

      const body = document.createElement("div");
      body.className = "s-body";
      body.innerHTML = `<div class="s-title">${escHtml(s.title)}${badge}</div><div class="s-meta">${date}</div>`;
      body.addEventListener("click", () => loadSession(s.id, s.title));

      const actions = document.createElement("div");
      actions.className = "s-actions";

      const delBtn = document.createElement("button");
      delBtn.className = "icon-btn danger";
      delBtn.title = "Delete session";
      delBtn.textContent = "🗑";
      delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        deleteSession(s.id, item);
      });

      actions.appendChild(delBtn);
      item.appendChild(body);
      item.appendChild(actions);
      transcript.appendChild(item);
    });
  }

  async function loadSession(id, title) {
    if (sessionId) return;
    try {
      const res = await fetch(`${API}/meeting/${id}/transcript`);
      if (!res.ok) return;
      const data = await res.json();

      transcript.innerHTML = "";

      const back = document.createElement("span");
      back.className = "view-back";
      back.textContent = "← Past meetings";
      back.addEventListener("click", loadPastSessions);
      transcript.appendChild(back);

      // Editable title
      const h = document.createElement("div");
      h.className = "editable-title";
      h.style.marginBottom = "10px";
      const titleSpan = document.createElement("span");
      titleSpan.textContent = title;
      const editBtn = document.createElement("button");
      editBtn.className = "edit-title-btn";
      editBtn.title = "Rename session";
      editBtn.textContent = "✏️";
      editBtn.addEventListener("click", () => startTitleEdit(id, titleSpan, editBtn));
      h.appendChild(titleSpan);
      h.appendChild(editBtn);
      transcript.appendChild(h);

      const exportBar = document.createElement("div");
      exportBar.className = "export-bar";
      exportBar.innerHTML = `
        <span style="font-size:12px; color:var(--text-muted);">Export:</span>
        <a class="export-btn" href="${API}/meeting/${id}/transcript/export?format=txt" download>TXT</a>
        <a class="export-btn" href="${API}/meeting/${id}/transcript/export?format=md" download>Markdown</a>`;
      transcript.appendChild(exportBar);

      // Summary card and action items card (past session view)
      const pastAiCard = buildPastActionItemsCard(id);
      transcript.appendChild(pastAiCard);

      // Summary card
      const summaryCard = document.createElement("div");
      summaryCard.className = "summary-card";
      const summaryHeaderEl = document.createElement("div");
      summaryHeaderEl.className = "summary-header";
      summaryHeaderEl.textContent = "📋 Meeting Summary";
      const summaryTextEl = document.createElement("div");
      summaryTextEl.className = "summary-text";
      summaryTextEl.style.color = "var(--text-muted)";
      summaryTextEl.textContent = "No summary yet.";
      const summaryActionsEl = document.createElement("div");
      summaryActionsEl.className = "summary-actions";
      const btnGen = document.createElement("button");
      btnGen.className = "btn-summarize";
      btnGen.textContent = "✨ Generate Summary";
      btnGen.addEventListener("click", () => requestSummary(id, summaryTextEl, btnGen, false));
      summaryActionsEl.appendChild(btnGen);
      summaryCard.appendChild(summaryHeaderEl);
      summaryCard.appendChild(summaryTextEl);
      summaryCard.appendChild(summaryActionsEl);
      transcript.appendChild(summaryCard);

      // Pre-fill cached summary if available
      fetchCachedSummary(id, summaryTextEl, btnGen);

      const divider = document.createElement("hr");
      divider.style.cssText = "border:none; border-top:1px solid var(--border); margin:12px 0;";
      transcript.appendChild(divider);

      // Search bar (only useful when there are utterances)
      if (data.utterances.length) {
        const searchBar = document.createElement("div");
        searchBar.className = "search-bar";
        const searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.placeholder = "Search transcript…";
        const clearBtn = document.createElement("button");
        clearBtn.className = "search-clear";
        clearBtn.title = "Clear search";
        clearBtn.textContent = "✕";
        searchBar.appendChild(searchInput);
        searchBar.appendChild(clearBtn);
        transcript.appendChild(searchBar);

        const noResultsEl = document.createElement("div");
        noResultsEl.className = "search-no-results";
        noResultsEl.style.display = "none";
        noResultsEl.textContent = "No matches found.";
        transcript.appendChild(noResultsEl);

        const filterUtterances = (q) => {
          const term = q.trim().toLowerCase();
          const utts = transcript.querySelectorAll(".utterance");
          let visible = 0;
          utts.forEach(el => {
            const text = el.querySelector(".text")?.textContent?.toLowerCase() || "";
            if (!term || text.includes(term)) {
              el.classList.remove("hidden");
              visible++;
            } else {
              el.classList.add("hidden");
            }
          });
          noResultsEl.style.display = (term && visible === 0) ? "" : "none";
        };

        searchInput.addEventListener("input", () => filterUtterances(searchInput.value));
        clearBtn.addEventListener("click", () => {
          searchInput.value = "";
          filterUtterances("");
        });
      }

      if (!data.utterances.length) {
        const e = document.createElement("div");
        e.className = "empty";
        e.style.height = "120px";
        e.textContent = "No transcript recorded for this session";
        transcript.appendChild(e);
      } else {
        data.utterances.forEach(u => addUtterance(u));
      }

      // Load past Q&A answers into the right panel
      loadPastAnswers(id);
    } catch (e) {
      console.error(e);
    }
  }

  async function loadPastAnswers(id) {
    try {
      const res = await fetch(`${API}/meeting/${id}/answers`);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.answers.length) return;

      answers.innerHTML = "";
      // Show oldest first at the bottom (newest prepended), so reverse
      [...data.answers].reverse().forEach(a => {
        const card = document.createElement("div");
        card.className = "qa-card";
        const q = document.createElement("div");
        q.className = "q";
        q.textContent = "Q: " + a.question;
        const aEl = document.createElement("div");
        aEl.className = "a";
        aEl.textContent = a.answer;
        card.appendChild(q);
        card.appendChild(aEl);
        answers.prepend(card);
      });
    } catch { /* ignore */ }
  }

  async function startTitleEdit(id, titleSpan, editBtn) {
    const currentTitle = titleSpan.textContent;
    const input = document.createElement("input");
    input.type = "text";
    input.value = currentTitle;
    input.style.maxWidth = "340px";
    titleSpan.replaceWith(input);
    editBtn.textContent = "✓";
    editBtn.title = "Save";
    input.focus();
    input.select();

    const save = async () => {
      const newTitle = input.value.trim() || currentTitle;
      try {
        await fetch(`${API}/meeting/${id}/title`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: newTitle }),
        });
      } catch { /* best-effort */ }
      titleSpan.textContent = newTitle;
      input.replaceWith(titleSpan);
      editBtn.textContent = "✏️";
      editBtn.title = "Rename session";
      editBtn.onclick = () => startTitleEdit(id, titleSpan, editBtn);
    };

    editBtn.onclick = save;
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") save();
      if (e.key === "Escape") {
        input.replaceWith(titleSpan);
        editBtn.textContent = "✏️";
        editBtn.title = "Rename session";
        editBtn.onclick = () => startTitleEdit(id, titleSpan, editBtn);
      }
    });
  }

  function buildPastActionItemsCard(id) {
    const card = document.createElement("div");
    card.className = "action-items-card";
    const header = document.createElement("div");
    header.className = "ai-header";
    header.textContent = "✅ Action Items";
    const textEl = document.createElement("div");
    textEl.className = "ai-text";
    textEl.style.color = "var(--text-muted)";
    textEl.textContent = "No action items extracted yet.";
    const actionsEl = document.createElement("div");
    actionsEl.className = "ai-actions";
    const btnGen = document.createElement("button");
    btnGen.className = "btn-action-items";
    btnGen.textContent = "✨ Extract Action Items";
    btnGen.addEventListener("click", () => requestActionItems(id, textEl, btnGen, false));
    actionsEl.appendChild(btnGen);
    card.appendChild(header);

  async function fetchCachedActionItems(id, textEl, btn) {
    try {
      const res = await fetch(`${API}/meeting/${id}/action-items`, { method: "POST" });
      const data = await res.json();
      if (data.cached && data.text) {
        textEl.style.color = "var(--text)";
        textEl.textContent = data.text;
        btn.textContent = "↺ Regenerate";
        btn.addEventListener("click", () => requestActionItems(id, textEl, btn, true), { once: true });
      }
    } catch { /* ignore */ }
  }

  async function requestActionItems(id, textEl, btn, forceRegen) {
    btn.disabled = true;
    btn.textContent = "⏳ Extracting…";
    textEl.style.color = "var(--text-muted)";
    textEl.textContent = "";

    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▊";
    textEl.appendChild(cursor);

    try {
      const endpoint = forceRegen
        ? `${API}/meeting/${id}/action-items/regenerate`
        : `${API}/meeting/${id}/action-items`;
      const res = await fetch(endpoint, { method: "POST" });
      const data = await res.json();

      if (data.cached && data.text) {
        cursor.remove();
        textEl.style.color = "var(--text)";
        textEl.textContent = data.text;
        btn.disabled = false;
        btn.textContent = "↺ Regenerate";
        return;
      }

      const actionItemsId = data.action_items_id;
      const tempWs = new WebSocket(`ws://localhost:8000/ws/${id}`);
      tempWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "action_items_start" && msg.id === actionItemsId) {
          textEl.style.color = "var(--text)";
        }
        if (msg.type === "action_items_token" && msg.id === actionItemsId) {
          textEl.insertBefore(document.createTextNode(msg.token), cursor);
        }
        if (msg.type === "action_items_end" && msg.id === actionItemsId) {
          cursor.remove();
          tempWs.close();
          btn.disabled = false;
          btn.textContent = "↺ Regenerate";
          btn.onclick = () => requestActionItems(id, textEl, btn, true);
          actionsEl.appendChild(makeCopyBtn(() => textEl.textContent));
        }
      };
      tempWs.onerror = () => {
        cursor.remove();
        textEl.textContent = "Error extracting action items. Is Ollama running?";
        btn.disabled = false;
        btn.textContent = "↺ Retry";
      };
    } catch {
      textEl.textContent = "Error extracting action items.";
      btn.disabled = false;
      btn.textContent = "↺ Retry";
    }
  }

  async function fetchCachedSummary(id, textEl, btn) {
    try {
      const res = await fetch(`${API}/meeting/${id}/summary`, { method: "POST" });
      const data = await res.json();
      if (data.cached && data.text) {
        textEl.style.color = "var(--text)";
        textEl.textContent = data.text;
        btn.textContent = "↺ Regenerate";
        btn.addEventListener("click", () => requestSummary(id, textEl, btn, true), { once: true });
      }
    } catch { /* ignore */ }
  }

  async function requestSummary(id, textEl, btn, forceRegen) {
    btn.disabled = true;
    btn.textContent = "⏳ Generating…";
    textEl.style.color = "var(--text-muted)";
    textEl.textContent = "";

    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▊";
    textEl.appendChild(cursor);

    try {
      const endpoint = forceRegen
        ? `${API}/meeting/${id}/summary/regenerate`
        : `${API}/meeting/${id}/summary`;
      const res = await fetch(endpoint, { method: "POST" });
      const data = await res.json();

      if (data.cached && data.text) {
        // Already had a cached version returned
        cursor.remove();
        textEl.style.color = "var(--text)";
        textEl.textContent = data.text;
        btn.disabled = false;
        btn.textContent = "↺ Regenerate";
        return;
      }

      // Stream via a temporary WebSocket
      const summaryId = data.summary_id;
      pendingSummaries[summaryId] = { textEl, cursor };

      const tempWs = new WebSocket(`ws://localhost:8000/ws/${id}`);
      tempWs.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "summary_start" && msg.id === summaryId) {
          textEl.style.color = "var(--text)";
        }
        if (msg.type === "summary_token" && msg.id === summaryId) {
          textEl.insertBefore(document.createTextNode(msg.token), cursor);
        }
        if (msg.type === "summary_end" && msg.id === summaryId) {
          cursor.remove();
          delete pendingSummaries[summaryId];
          tempWs.close();
          btn.disabled = false;
          btn.textContent = "↺ Regenerate";
          btn.onclick = () => requestSummary(id, textEl, btn, true);
          summaryActionsEl.appendChild(makeCopyBtn(() => textEl.textContent));
        }
      };
      tempWs.onerror = () => {
        cursor.remove();
        textEl.textContent = "Error generating summary. Is Ollama running?";
        btn.disabled = false;
        btn.textContent = "↺ Retry";
      };
    } catch {
      textEl.textContent = "Error generating summary.";
      btn.disabled = false;
      btn.textContent = "↺ Retry";
    }
  }

  async function deleteSession(id, itemEl) {
    if (!confirm("Delete this session and its transcript? This cannot be undone.")) return;
    try {
      await fetch(`${API}/meeting/${id}`, { method: "DELETE" });
      itemEl.remove();
      // If history list is now empty, show empty state
      if (!transcript.querySelector(".session-item")) showEmptyState();
    } catch {
      showToast("Could not delete session");
    }
  }

  // ── Start ──────────────────────────────────────────────────────────────────
  btnStart.addEventListener("click", async () => {
    btnStart.disabled = true;
    setRecStatus(false, "Starting…");
    await checkHealth();
    try {
      const title = titleInput.value.trim() || null;
      const res = await fetch(`${API}/meeting/start`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      const data = await res.json();
      sessionId = data.session_id;

      btnEnd.disabled = false;
      btnPtt.disabled = false;
      btnSummarize.disabled = false;
      btnActionItems.disabled = false;
      titleInput.disabled = true;
      setRecStatus(true, "Recording");
      sessionInfo.textContent = `Session: ${sessionId.slice(0, 8)}`;
      transcript.innerHTML = "";
      answers.innerHTML = "";

      connectWs(sessionId);
    } catch {
      setRecStatus(false, "Error — is the server running?");
      btnStart.disabled = false;
      titleInput.disabled = false;
    }
  });

  // ── End ────────────────────────────────────────────────────────────────────
  btnEnd.addEventListener("click", async () => {
    if (!sessionId) return;
    btnEnd.disabled = true;
    btnPtt.disabled = true;
    btnSummarize.disabled = true;
    btnActionItems.disabled = true;
    titleInput.disabled = false;
    await fetch(`${API}/meeting/${sessionId}/end`, { method: "POST" });
    if (_wsRetryTimer) { clearTimeout(_wsRetryTimer); _wsRetryTimer = null; }
    if (ws) ws.close();
    setRecStatus(false, "Meeting ended");
    sessionInfo.textContent += " · ended";
    btnStart.disabled = false;
    sessionId = null;
    setTimeout(loadPastSessions, 400); // small delay so DB write settles
  });

  // ── Summarize (active meeting) ─────────────────────────────────────────────
  btnSummarize.addEventListener("click", async () => {
    if (!sessionId) return;
    btnSummarize.disabled = true;
    btnSummarize.textContent = "⏳ Generating…";
    try {
      await fetch(`${API}/meeting/${sessionId}/summary`, { method: "POST" });
      // Tokens arrive via WebSocket (summary_start / summary_token / summary_end)
    } catch {
      showToast("Could not reach the server");
      btnSummarize.disabled = false;
      btnSummarize.textContent = "📋 Summarize meeting";
    }
  });

  // ── Action items (active meeting) ──────────────────────────────────────────
  btnActionItems.addEventListener("click", async () => {
    if (!sessionId) return;
    btnActionItems.disabled = true;
    btnActionItems.textContent = "⏳ Extracting…";
    try {
      await fetch(`${API}/meeting/${sessionId}/action-items`, { method: "POST" });
      // Tokens arrive via WebSocket (action_items_start / token / end)
    } catch {
      showToast("Could not reach the server");
      btnActionItems.disabled = false;
      btnActionItems.textContent = "✅ Extract action items";
    }
  });

  // ── WebSocket (with auto-reconnect) ───────────────────────────────────────
  let _wsRetryDelay = 1000;
  let _wsRetryTimer = null;

  function connectWs(sid) {
    if (!sessionId || sessionId !== sid) return; // session ended
    ws = new WebSocket(`ws://localhost:8000/ws/${sid}`);

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "utterance")           addUtterance(msg);
      if (msg.type === "answer_start")        startAnswer(msg);
      if (msg.type === "answer_token")        appendToken(msg);
      if (msg.type === "answer_end")          finalizeAnswer(msg);
      if (msg.type === "summary_start")       startActiveSummary(msg);
      if (msg.type === "summary_token")       appendSummaryToken(msg);
      if (msg.type === "summary_end")         finalizeActiveSummary(msg);
      if (msg.type === "action_items_start")  startActiveActionItems(msg);
      if (msg.type === "action_items_token")  appendActionItemsToken(msg);
      if (msg.type === "action_items_end")    finalizeActiveActionItems(msg);
    };

    ws.onopen = () => {
      _wsRetryDelay = 1000; // reset backoff on successful connect
      setRecStatus(true, "Recording");
    };

    ws.onerror = () => setRecStatus(true, "Recording (WS error)");

    ws.onclose = () => {
      if (!sessionId || sessionId !== sid) return; // intentional close
      setRecStatus(true, `Recording (reconnecting…)`);
      _wsRetryTimer = setTimeout(() => {
        _wsRetryDelay = Math.min(_wsRetryDelay * 2, 30000);
        connectWs(sid);
      }, _wsRetryDelay);
    };
  }

  // ── PTT ────────────────────────────────────────────────────────────────────
  btnPtt.addEventListener("mousedown", startRecording);
  btnPtt.addEventListener("mouseup",   stopRecording);
  btnPtt.addEventListener("touchstart", (e) => { e.preventDefault(); startRecording(); });
  btnPtt.addEventListener("touchend",   (e) => { e.preventDefault(); stopRecording(); });

  // Space bar shortcut — hold to record, release to send
  let spaceHeld = false;
  document.addEventListener("keydown", (e) => {
    if (e.code !== "Space" || spaceHeld) return;
    if (document.activeElement === titleInput) return; // typing in input
    if (!sessionId || btnPtt.disabled) return;
    e.preventDefault();
    spaceHeld = true;
    startRecording();
  });
  document.addEventListener("keyup", (e) => {
    if (e.code !== "Space" || !spaceHeld) return;
    e.preventDefault();
    spaceHeld = false;
    stopRecording();
  });

  async function startRecording() {
    if (!sessionId) return;
    audioChunks = [];
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.start();
    btnPtt.classList.add("recording");
    btnPtt.textContent = "🔴";
  }

  async function stopRecording() {
    if (!mediaRecorder || mediaRecorder.state === "inactive") return;
    mediaRecorder.stop();
    btnPtt.classList.remove("recording");
    btnPtt.textContent = "⏳";
    btnPtt.disabled = true;

    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      const form = new FormData();
      form.append("audio", blob, "question.webm");
      try {
        await fetch(`${API}/meeting/${sessionId}/ptt`, { method: "POST", body: form });
        // Answer streams token-by-token via WebSocket (answer_start / answer_token / answer_end)
      } catch {
        showToast("Could not reach the server");
      }
      btnPtt.textContent = "🎤";
      btnPtt.disabled = false;
    };
  }

  // ── Render helpers ─────────────────────────────────────────────────────────
  function setRecStatus(live, label) {
    recDot.className = "dot" + (live ? " live" : "");
    recLabel.textContent = label;
  }

  function fmtTime(secs) {
    const m = Math.floor(secs / 60).toString().padStart(2, "0");
    const s = Math.floor(secs % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
  }

  function addUtterance(msg) {
    const div = document.createElement("div");
    div.className = "utterance";
    div.innerHTML = `
      <div class="time">${fmtTime(msg.start)} – ${fmtTime(msg.end)}</div>
      <div class="text">${escHtml(msg.text)}</div>`;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function startAnswer(msg) {
    const empty = answers.querySelector(".empty");
    if (empty) empty.remove();

    const div = document.createElement("div");
    div.className = "answer-card";
    div.dataset.answerId = msg.id;

    const q = document.createElement("div");
    q.className = "q";
    q.textContent = "Q: " + (msg.question || "");

    const a = document.createElement("div");
    a.className = "a";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▊";
    a.appendChild(cursor);

    div.appendChild(q);
    div.appendChild(a);
    answers.prepend(div);
    pendingAnswers[msg.id] = a;
  }

  function appendToken(msg) {
    const el = pendingAnswers[msg.id];
    if (!el) return;
    const cursor = el.querySelector(".cursor");
    if (cursor) el.insertBefore(document.createTextNode(msg.token), cursor);
    else el.appendChild(document.createTextNode(msg.token));
  }

  function finalizeAnswer(msg) {
    const el = pendingAnswers[msg.id];
    if (!el) return;
    const cursor = el.querySelector(".cursor");
    if (cursor) cursor.remove();
    delete pendingAnswers[msg.id];
  }

  function startActiveSummary(msg) {
    const empty = answers.querySelector(".empty");
    if (empty) empty.remove();

    const card = document.createElement("div");
    card.className = "summary-card";
    card.dataset.summaryId = msg.id;
    card.style.borderColor = "var(--accent)";

    const header = document.createElement("div");
    header.className = "summary-header";
    header.textContent = "📋 Meeting Summary";

    const textEl = document.createElement("div");
    textEl.className = "summary-text";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▊";
    textEl.appendChild(cursor);

    card.appendChild(header);
    card.appendChild(textEl);
    answers.prepend(card);
    pendingSummaries[msg.id] = textEl;
  }

  function appendSummaryToken(msg) {
    const el = pendingSummaries[msg.id];
    if (!el) return;
    const cursor = el.querySelector(".cursor");
    if (cursor) el.insertBefore(document.createTextNode(msg.token), cursor);
    else el.appendChild(document.createTextNode(msg.token));
  }

  function finalizeActiveSummary(msg) {
    const el = pendingSummaries[msg.id];
    if (!el) return;
    const cursor = el.querySelector(".cursor");
    if (cursor) cursor.remove();
    delete pendingSummaries[msg.id];
    const card = el.closest(".summary-card");
    if (card) {
      card.style.borderColor = "";
      const actionsEl = card.querySelector(".summary-actions") || (() => {
        const a = document.createElement("div");
        a.className = "summary-actions";
        card.appendChild(a);
        return a;
      })();
      actionsEl.appendChild(makeCopyBtn(() => el.textContent));
    }
    btnSummarize.disabled = false;
    btnSummarize.textContent = "📋 Summarize meeting";
  }

  function startActiveActionItems(msg) {
    const empty = answers.querySelector(".empty");
    if (empty) empty.remove();

    const card = document.createElement("div");
    card.className = "action-items-card";
    card.dataset.actionItemsId = msg.id;
    card.style.borderColor = "var(--green)";

    const header = document.createElement("div");
    header.className = "ai-header";
    header.textContent = "✅ Action Items";

    const textEl = document.createElement("div");
    textEl.className = "ai-text";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.textContent = "▊";
    textEl.appendChild(cursor);

    card.appendChild(header);
    card.appendChild(textEl);
    answers.prepend(card);
    pendingActionItems[msg.id] = textEl;
  }

  function appendActionItemsToken(msg) {
    const el = pendingActionItems[msg.id];
    if (!el) return;
    const cursor = el.querySelector(".cursor");
    if (cursor) el.insertBefore(document.createTextNode(msg.token), cursor);
    else el.appendChild(document.createTextNode(msg.token));
  }

  function finalizeActiveActionItems(msg) {
    const el = pendingActionItems[msg.id];
    if (!el) return;
    const cursor = el.querySelector(".cursor");
    if (cursor) cursor.remove();
    delete pendingActionItems[msg.id];
    const card = el.closest(".action-items-card");
    if (card) {
      card.style.borderColor = "";
      const actionsEl = document.createElement("div");
      actionsEl.className = "ai-actions";
      actionsEl.appendChild(makeCopyBtn(() => el.textContent));
      card.appendChild(actionsEl);
    }
    btnActionItems.disabled = false;
    btnActionItems.textContent = "✅ Extract action items";
  }

  function showToast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  // ── Copy to clipboard ──────────────────────────────────────────────────────
  function makeCopyBtn(getTextFn) {
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copy";
    btn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(getTextFn());
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
      } catch {
        showToast("Copy failed — check browser permissions");
      }
    });
    return btn;
  }

  // ── Settings ───────────────────────────────────────────────────────────────
  const settingsOverlay = document.getElementById("settings-overlay");
  const cfgOllamaModel  = document.getElementById("cfg-ollama-model");
  const cfgWhisperLang  = document.getElementById("cfg-whisper-lang");

  document.getElementById("btn-settings").addEventListener("click", async () => {
    try {
      const res = await fetch(`${API}/settings`);
      const s = await res.json();
      cfgOllamaModel.value = s.ollama_model || "";
      cfgWhisperLang.value = s.whisper_language || "";
    } catch { /* best-effort pre-fill */ }
    settingsOverlay.classList.add("open");
  });

  document.getElementById("settings-cancel").addEventListener("click", () => {
    settingsOverlay.classList.remove("open");
  });

  settingsOverlay.addEventListener("click", (e) => {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove("open");
  });

  document.getElementById("settings-save").addEventListener("click", async () => {
    const body = {};
    if (cfgOllamaModel.value.trim()) body.ollama_model = cfgOllamaModel.value.trim();
    if (cfgWhisperLang.value.trim())  body.whisper_language = cfgWhisperLang.value.trim();
    if (!Object.keys(body).length) { settingsOverlay.classList.remove("open"); return; }
    try {
      const res = await fetch(`${API}/settings`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json();
        showToast(err.detail || "Settings save failed");
        return;
      }
      settingsOverlay.classList.remove("open");
      await checkHealth(); // refresh Ollama status with new model
    } catch {
      showToast("Could not save settings");
    }
  });
</script>
</body>
</html>
