name: Metrics Testing

# ── Disabled — pending dataset setup ─────────────────────────────────────────
#
# This workflow is MANUAL-ONLY (workflow_dispatch) and each job is gated
# behind `if: false` until the dataset infrastructure is ready.
#
# To enable a suite:
#   1. Remove (or flip) the `if: false` on the relevant job.
#   2. Provide the required environment variables / secrets.
#   3. For mass_testing, set the DATASET_PATH secret in repo settings.
#
# Test locations:
#   integration_testing/  — singular examples, hot-fix validation
#   mass_testing/         — ground truth datasets, accuracy benchmarks
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options:
          - integration
          - mass
          - all

jobs:
  # ── Integration Tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: false  # enable when integration examples are in place

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Run integration tests
        run: >-
          uv run
          --with pytest
          --with "httpx>=0.27.0"
          --with "fastapi>=0.111.0"
          --with "pydantic>=2.7.0"
          --with python-multipart
          --with aiofiles
          pytest src/tests/integration_testing/ -v --tb=short

  # ── Mass Tests ───────────────────────────────────────────────────────────────
  mass-tests:
    name: Mass Tests (dataset benchmarks)
    runs-on: ubuntu-latest
    if: false  # enable when DATASET_PATH is configured

    env:
      DATASET_PATH: ${{ secrets.DATASET_PATH }}
      DATASET_FORMAT: ${{ vars.DATASET_FORMAT || 'json' }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Run mass tests
        run: >-
          uv run
          --with pytest
          --with "httpx>=0.27.0"
          --with "fastapi>=0.111.0"
          --with "pydantic>=2.7.0"
          --with python-multipart
          --with aiofiles
          pytest src/tests/mass_testing/ -v --tb=short
